packages:
  - packages/*
  - examples/*
  - examples/example/*

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  unrs-resolver: true

catalog:
  # ── Frameworks ──────────────────────────────────
  vue: ^3.5.39
  '@vue/server-renderer': ^3.5.39
  react: ^19.2.7
  react-dom: ^19.2.7

  # ── Build toolchain ────────────────────────────
  # TypeScript 7 owns the tsc bin but does not ship the legacy JS compiler API.
  # Keep "typescript" on 6.x for eslint/tsup/vue-tsc until those tools support TS 7.
  typescript: ^6.0.3
  '@typescript/native': npm:typescript@^7.0.2
  tsup: ^8.5.1
  vite: ^8.1.3

  # ── Styling ────────────────────────────────────
  tailwindcss: ^4.3.2
  '@tailwindcss/vite': ^4.3.2
  '@tailwindcss/browser': ^4.3.2

  # ── Vite plugins ───────────────────────────────
  '@vitejs/plugin-vue': ^6.0.7
  '@vitejs/plugin-react': ^6.0.3

  # ── Playground compiler (examples) ─────────────
  sucrase: 3.35.1
  es-module-lexer: 2.3.0

  # ── Type definitions ───────────────────────────
  '@types/node': ^26.1.1
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3

  # ── Vue tooling ────────────────────────────────
  '@vue/tsconfig': ^0.9.1
  vue-tsc: ^3.3.7
  '@vue/compiler-sfc': ^3.5.39

  # ── Testing ────────────────────────────────────
  axe-core: ^4.12.1

minimumReleaseAgeExclude:
  - '@playwright/test@1.61.1'
  - '@vitejs/plugin-react@6.0.3'
  - playwright-core@1.61.1
  - playwright@1.61.1
  - vite@8.1.0
  - '@typescript/typescript-aix-ppc64@7.0.2'
  - '@typescript/typescript-darwin-arm64@7.0.2'
  - '@typescript/typescript-darwin-x64@7.0.2'
  - '@typescript/typescript-freebsd-arm64@7.0.2'
  - '@typescript/typescript-freebsd-x64@7.0.2'
  - '@typescript/typescript-linux-arm64@7.0.2'
  - '@typescript/typescript-linux-arm@7.0.2'
  - '@typescript/typescript-linux-loong64@7.0.2'
  - '@typescript/typescript-linux-mips64el@7.0.2'
  - '@typescript/typescript-linux-ppc64@7.0.2'
  - '@typescript/typescript-linux-riscv64@7.0.2'
  - '@typescript/typescript-linux-s390x@7.0.2'
  - '@typescript/typescript-linux-x64@7.0.2'
  - '@typescript/typescript-netbsd-arm64@7.0.2'
  - '@typescript/typescript-netbsd-x64@7.0.2'
  - '@typescript/typescript-openbsd-arm64@7.0.2'
  - '@typescript/typescript-openbsd-x64@7.0.2'
  - '@typescript/typescript-sunos-x64@7.0.2'
  - '@typescript/typescript-win32-arm64@7.0.2'
  - '@typescript/typescript-win32-x64@7.0.2'
  - typescript@7.0.2

overrides:
  # Security patches for transitive dependencies that are still pinned below
  # their fixed releases by otherwise-current direct dependencies.
  '@babel/core@<=7.29.0': 7.29.7
  'brace-expansion@>=2.0.0 <2.0.3': 2.0.3
  'brace-expansion@>=5.0.0 <5.0.6': 5.0.6
  'esbuild@>=0.27.3 <0.28.1': 0.28.1
  'js-cookie@<=3.0.5': 3.0.6
  'js-yaml@<=4.1.1': 4.2.0
  'launch-editor@<=2.14.0': 2.14.1
  'minimatch@>=9.0.0 <9.0.7': 9.0.7
  '@manypkg/get-packages>read-yaml-file': 2.1.0
  'next>postcss': 8.5.10
  'fix-dts-default-cjs-exports>rollup': 4.59.0
  'tsup>rollup': 4.59.0
  'tar@<=7.5.15': 7.5.16
  '@nuxt/vite-builder>vite': 7.3.5
  '@vitejs/plugin-vue-jsx>vite': 7.3.5
  'vite-node>vite': 7.3.5
  'vite-plugin-checker>vite': 7.3.5
  'ws@>=8.0.0 <8.21.0': 8.21.0
  vite-dev-rpc: 2.0.0
  vite-plugin-inspect: 11.4.1
