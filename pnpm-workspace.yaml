packages:
  - packages/*
  - examples/*
  - examples/example/*

catalog:
  # ── Frameworks ──────────────────────────────────
  vue: ^3.5.38
  '@vue/server-renderer': ^3.5.38
  react: ^19.2.7
  react-dom: ^19.2.7

  # ── Build toolchain ────────────────────────────
  typescript: ^6.0.3
  tsup: ^8.5.1
  vite: ^8.0.10

  # ── Styling ────────────────────────────────────
  tailwindcss: ^4.3.1
  '@tailwindcss/vite': ^4.3.1

  # ── Vite plugins ───────────────────────────────
  '@vitejs/plugin-vue': ^6.0.7

  # ── Type definitions ───────────────────────────
  '@types/node': ^25.6.0
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3

  # ── Testing ────────────────────────────────────
  axe-core: ^4.12.1

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - sharp
  - unrs-resolver
