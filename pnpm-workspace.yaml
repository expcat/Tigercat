  '@vue/server-renderer': ^3.5.34
  react: ^19.2.5
  react-dom: ^19.2.5

  # ── Build toolchain ────────────────────────────
  typescript: ^6.0.3
  tsup: ^8.5.1
  vite: ^8.0.10

