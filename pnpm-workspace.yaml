packages:
  - packages/*
  - examples/*
  - examples/example/*

catalog:
  # ── Frameworks ──────────────────────────────────
  vue: ^3.5.33
  '@vue/server-renderer': ^3.5.33
  react: ^19.2.5
  react-dom: ^19.2.5

  # ── Build toolchain ────────────────────────────
  typescript: ^6.0.3
  tsup: ^8.5.1
  vite: ^8.0.10

  # ── Styling ────────────────────────────────────
  tailwindcss: ^4.2.4
  '@tailwindcss/vite': ^4.2.4

  # ── Vite plugins ───────────────────────────────
  '@vitejs/plugin-vue': ^6.0.6
  '@vitejs/plugin-react': ^6.0.1

  # ── Type definitions ───────────────────────────
  '@types/node': ^25.6.0
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3

  # ── Vue tooling ────────────────────────────────
  '@vue/tsconfig': ^0.9.1
  vue-tsc: ^3.2.7

  # ── Testing ────────────────────────────────────
  axe-core: ^4.11.3

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - sharp
  - unrs-resolver
