version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    groups:
      vite-tailwind-toolchain:
        patterns:
          - vite
          - '@vitejs/*'
          - tailwindcss
          - '@tailwindcss/*'
      test-tooling:
        patterns:
          - vitest
          - '@vitest/*'
          - '@testing-library/*'
          - '@playwright/*'
      lint-format-tooling:
        patterns:
          - eslint
          - '@eslint/*'
          - '@typescript-eslint/*'
          - prettier
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
