version: 2

updates:
  # Workspace dependencies (single pnpm-lock.yaml at repo root covers all packages)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      # Collapse non-major bumps into a single PR to reduce noise
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep GitHub Actions referenced in .github/workflows current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - '*'
