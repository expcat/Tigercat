name: Benchmarks

# Runtime performance benchmarks (benchmarks/*.bench.ts via `vitest bench`).
#
# Intentionally NOT a PR gate: micro-benchmark timings are noisy on shared CI
# runners, so a hard regression threshold would flake. This job runs on demand
# (and weekly) and uploads the result JSON as an artifact for manual comparison
# against a previous run. Automated baseline-diff thresholds are deferred.

on:
  schedule:
    # Weekly, Monday 07:00 Asia/Shanghai (23:00 UTC Sunday)
    - cron: '0 23 * * 0'
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run benchmarks
        run: pnpm bench --run --outputJson=bench-results.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: bench-results.json
          retention-days: 30
