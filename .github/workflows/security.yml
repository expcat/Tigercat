name: Security Audit

# Weekly dependency advisory visibility. Remediation is driven by Dependabot
# (see .github/dependabot.yml), which opens PRs to bump affected packages.
#
# This job is intentionally report-only (continue-on-error): the workspace
# pulls a large dev/example toolchain (Nuxt, Vite, Playwright, etc.) whose
# transitive advisories are not shipped to consumers — the published packages
# (core/vue/react/cli) only carry `@floating-ui/dom` at runtime. A hard block
# would stay perpetually red on example/dev-only advisories and train everyone
# to ignore it. The audit surfaces the current advisory set; Dependabot fixes it.

on:
  schedule:
    # Weekly, Monday 06:30 Asia/Shanghai (22:30 UTC Sunday)
    - cron: '30 22 * * 0'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (report-only)
        continue-on-error: true
        shell: bash
        run: |
          {
            echo '## pnpm audit — high and above'
            echo ''
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          pnpm audit --audit-level=high 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
