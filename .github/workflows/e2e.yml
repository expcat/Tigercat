name: E2E Tests

on:
  pull_request:
  schedule:
    # Nightly, Tuesday-Saturday 08:00 Asia/Shanghai (00:00 UTC)
    - cron: '0 0 * * 2-6'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.event_name == 'schedule' && 'nightly' || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run E2E smoke tests
        if: github.event_name == 'pull_request'
        run: pnpm e2e:smoke
        env:
          HOME: /root

      - name: Run E2E tests
        if: github.event_name != 'pull_request'
        run: pnpm e2e
        env:
          HOME: /root

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
