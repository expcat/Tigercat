name: Prerelease Packages

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'npm dist-tag to publish'
        required: true
        default: next
        type: choice
        options:
          - next
          - canary
  schedule:
    - cron: '0 18 * * *'

permissions:
  contents: read
  id-token: write

jobs:
  prerelease:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve channel
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "value=canary" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish prerelease
        run: pnpm release:${{ steps.channel.outputs.value }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
