name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Generate API docs
        run: pnpm docs:api

      - name: Check generated docs are current
        run: git diff --exit-code docs/api-summary.md skills/tigercat/references/shared/api-summary.md skills/tigercat/references/shared/generated-props.md

      - name: Validate API and LLM docs
        run: pnpm api:validate

      - name: Run axe accessibility regression
        run: pnpm test:a11y

      - name: Check bundle size
        run: pnpm size
