name: CI

on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Validate test quality
        run: pnpm test:validate

      - name: Generate LLM API docs
        run: pnpm docs:api

      - name: Check generated skill references are current
        run: git diff --exit-code skills/tigercat/references

      - name: Generate public API baseline
        run: pnpm api:baseline

      - name: Check public API baseline is current
        run: git diff --exit-code api-reports

      - name: Validate API and LLM docs
        run: pnpm api:validate

      - name: Run axe accessibility regression
        run: pnpm test:a11y

      - name: Check bundle size
        run: pnpm size
