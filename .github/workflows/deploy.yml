name: Deploy GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ['Create Release Tags']
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Build Vue example
        run: pnpm --filter @expcat/tigercat-example-vue3 build

      - name: Build React example
        run: pnpm --filter @expcat/tigercat-example-react build

      - name: Prepare public_html
        run: |
          mkdir -p public_html/mcp
          cp examples/index.html public_html/index.html
          mv examples/example/vue3/dist public_html/vue
          mv examples/example/react/dist public_html/react
          cp examples/mcp/index.html public_html/mcp/index.html
          cp context7.json public_html/mcp/context7.json
          cp -r skills public_html/mcp/skills
          node -e "const fs=require('fs');const v=JSON.parse(fs.readFileSync('package.json','utf8')).version;fs.writeFileSync('public_html/mcp/version.json',JSON.stringify({version:v,commit:process.env.GITHUB_SHA||'',builtAt:new Date().toISOString()})+'\n')"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public_html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
