name: Deploy GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ['Create Release Tags']
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages and docs
        run: pnpm build && pnpm docs:build

      - name: Build examples
        run: pnpm example:build

      - name: Prepare Pages artifact
        run: |
          mkdir -p docs/.vitepress/dist/examples
          cp examples/example/vue3/dist/index.html examples/example/vue3/dist/404.html
          cp examples/example/react/dist/index.html examples/example/react/dist/404.html
          mv examples/example/vue3/dist docs/.vitepress/dist/examples/vue
          mv examples/example/react/dist docs/.vitepress/dist/examples/react

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
