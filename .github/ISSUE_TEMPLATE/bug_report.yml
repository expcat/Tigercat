name: Bug Report
description: Report a reproducible problem in Tigercat
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Tigercat. Please include a minimal reproduction so we can diagnose the issue quickly.
  - type: input
    id: component
    attributes:
      label: Component or package
      description: Which component or package is affected?
      placeholder: Button, DatePicker, @expcat/tigercat-react, CLI, etc.
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - Vue 3
        - React
        - Core
        - CLI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Link a repo, StackBlitz, or paste the smallest code sample that reproduces the issue.
      placeholder: |
        1. Install ...
        2. Render ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happens instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include package versions and runtime details.
      value: |
        - Tigercat version:
        - Framework version:
        - Tailwind version:
        - Browser / Node version:
        - OS:
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, logs, accessibility impact, or related issues.
