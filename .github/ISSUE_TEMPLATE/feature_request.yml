name: Feature Request
description: Suggest an enhancement for an existing Tigercat feature
title: '[Feature]: '
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for improvements to existing components, packages, documentation, or tooling.
  - type: input
    id: area
    attributes:
      label: Area
      description: Which component, package, or workflow would this improve?
      placeholder: Select, Table, theme tokens, CLI add, docs, etc.
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - Vue 3
        - React
        - Cross-framework
        - Core
        - CLI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or limitation does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or workflow you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or related libraries.
  - type: checkboxes
    id: impact
    attributes:
      label: Impact checklist
      options:
        - label: This may require Vue and React implementation changes.
        - label: This may require shared core types or utilities.
        - label: This may require documentation or example updates.
        - label: This may affect accessibility, keyboard behavior, or i18n.
